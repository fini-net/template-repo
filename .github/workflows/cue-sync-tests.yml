---
name: Cue Sync Tests

on:
  push:
    paths:
      - '.just/cue-verify.just'
      - '.just/lib/cue_sync.awk'
      - '.just/lib/cue_sync_test.sh'
      - '.just/test/fixtures/cue_sync/**'
      - '.github/workflows/cue-sync-tests.yml'
  pull_request:
    paths:
      - '.just/cue-verify.just'
      - '.just/lib/cue_sync.awk'
      - '.just/lib/cue_sync_test.sh'
      - '.just/test/fixtures/cue_sync/**'
      - '.github/workflows/cue-sync-tests.yml'

# global permissions
permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Make test script executable
        run: chmod +x .just/lib/cue_sync_test.sh

      - name: Run cue-sync tests
        run: just cue_sync_test
