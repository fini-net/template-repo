---
name: Template Sync Tests

on:
  push:
    paths:
      - '.just/lib/*checksum*.sh'
      - '.just/lib/template_*.sh'
      - '.just/template-sync.just'
      - '.just/test/fixtures/template_sync/**'
      - '.github/workflows/template-sync.yml'
  pull_request:
    paths:
      - '.just/lib/*checksum*.sh'
      - '.just/lib/template_*.sh'
      - '.just/template-sync.just'
      - '.just/test/fixtures/template_sync/**'
      - '.github/workflows/template-sync.yml'

# global permissions
permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Full history for checksum generation
          persist-credentials: false

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Run template sync tests
        run: just template_sync_test

      - name: Generate checksums (validation)
        run: just checksums_generate

      - name: Verify checksums file is valid JSON
        run: jq empty .just/CHECKSUMS.json
