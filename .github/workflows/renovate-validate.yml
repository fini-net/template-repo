---
name: Validate Renovate config

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/renovate.json'
      - '.github/workflows/renovate-validate.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/renovate.json'
      - '.github/workflows/renovate-validate.yml'
  workflow_dispatch:

# global permissions
permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Validate renovate.json
        uses: docker://ghcr.io/renovatebot/renovate@sha256:bdfacabadd6dcf12558d3bfd44bb6f197064a8cb8c20d2f058e450460fe1783d
        with:
          args: renovate-config-validator .github/renovate.json
